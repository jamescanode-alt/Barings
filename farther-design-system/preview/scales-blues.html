<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Blue scales</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:20px 26px;background:var(--surface-canvas);font-family:var(--font-sans);}
 .group{margin-bottom:12px;}
 .g-title{font-size:11px;color:var(--fg-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;display:flex;justify-content:space-between;}
 .row{display:flex;gap:2px;}
 .step{flex:1;height:28px;border-radius:4px;}
</style></head>
<body>
<div class="group"><div class="g-title"><span>Steel Blue</span><span>700 = #3B5A69 · wordmark</span></div>
<div class="row">
<div class="step" style="background:#FBFDFF"></div><div class="step" style="background:#F5F8FA"></div><div class="step" style="background:#EBF0F3"></div><div class="step" style="background:#D2DFE5"></div><div class="step" style="background:#94B5C3"></div><div class="step" style="background:#7CA4B4"></div><div class="step" style="background:#5B8A9C"></div><div class="step" style="background:#476F82"></div><div class="step" style="background:#3B5A69"></div><div class="step" style="background:#334D59"></div><div class="step" style="background:#2F424B"></div>
</div></div>
<div class="group"><div class="g-title"><span>Granite Blue</span><span>800 = #31465C · deep</span></div>
<div class="row">
<div class="step" style="background:#FCFDFF"></div><div class="step" style="background:#F5F7FA"></div><div class="step" style="background:#EAEEF4"></div><div class="step" style="background:#D0DBE7"></div><div class="step" style="background:#A7BDD2"></div><div class="step" style="background:#779AB9"></div><div class="step" style="background:#567EA1"></div><div class="step" style="background:#436486"></div><div class="step" style="background:#37516D"></div><div class="step" style="background:#31465C"></div><div class="step" style="background:#2C3B4E"></div>
</div></div>
<div class="group"><div class="g-title"><span>Smalt Blue</span><span>500 = #557A89</span></div>
<div class="row">
<div class="step" style="background:#F9FBFD"></div><div class="step" style="background:#F3F7F8"></div><div class="step" style="background:#E1E9EC"></div><div class="step" style="background:#C6D6DB"></div><div class="step" style="background:#9EB9C2"></div><div class="step" style="background:#6F94A1"></div><div class="step" style="background:#557A89"></div><div class="step" style="background:#486472"></div><div class="step" style="background:#3F535F"></div><div class="step" style="background:#394851"></div><div class="step" style="background:#333E46"></div>
</div></div>
<div class="group"><div class="g-title"><span>Sky Blue</span><span>300 = #B6D0ED · optimistic</span></div>
<div class="row">
<div class="step" style="background:#F9FCFF"></div><div class="step" style="background:#F2F6FC"></div><div class="step" style="background:#E2EBF7"></div><div class="step" style="background:#CBDCF2"></div><div class="step" style="background:#B6D0ED"></div><div class="step" style="background:#7DA8DD"></div><div class="step" style="background:#5E8AD3"></div><div class="step" style="background:#4A71C6"></div><div class="step" style="background:#405FB5"></div><div class="step" style="background:#394E94"></div><div class="step" style="background:#324476"></div>
</div></div>
</body></html>
