<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 26px;background:var(--surface-canvas);font-family:var(--font-sans);}
.row{display:flex;gap:14px;align-items:flex-end;}
.item{display:flex;flex-direction:column;gap:6px;align-items:center;}
.box{width:68px;height:68px;background:#fff;border:1px solid var(--border-hairline-warm);}
.tok{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
.name{font-size:11px;color:var(--fg-primary);}
</style></head>
<body>
<div class="row">
 <div class="item"><div class="box" style="border-radius:4px"></div><div class="name">xs</div><div class="tok">4</div></div>
 <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="tok">6</div></div>
 <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">md</div><div class="tok">10</div></div>
 <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">lg · card</div><div class="tok">12</div></div>
 <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">xl</div><div class="tok">16</div></div>
 <div class="item"><div class="box" style="border-radius:24px"></div><div class="name">2xl</div><div class="tok">24</div></div>
 <div class="item"><div class="box" style="border-radius:9999px"></div><div class="name">pill · cta</div><div class="tok">9999</div></div>
</div>
</body></html>
