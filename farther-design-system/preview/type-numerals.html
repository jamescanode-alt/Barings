<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Numerals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 26px;background:var(--surface-canvas);}
.eyebrow{font-family:var(--font-sans);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:6px;}
.row{display:flex;gap:22px;align-items:baseline;}
.stat{display:flex;flex-direction:column;align-items:flex-start;}
.big{font-family:var(--font-display);font-weight:300;letter-spacing:-.03em;line-height:1;color:var(--fg-primary);}
.label{font-family:var(--font-sans);font-size:11px;color:var(--fg-muted);margin-top:6px;}
.delta-up{color:#289FAF;font-family:var(--font-sans);font-size:12px;font-weight:500;}
.delta-dn{color:#A42843;font-family:var(--font-sans);font-size:12px;font-weight:500;}
</style></head>
<body>
<div class="eyebrow">Numerals · Arizona Text Light · tabular</div>
<div class="row">
 <div class="stat"><div class="big" style="font-size:60px;">$7B+</div><div class="label">Assets under management</div></div>
 <div class="stat"><div class="big" style="font-size:60px;">3×</div><div class="label">Advisor book growth</div></div>
 <div class="stat"><div class="big" style="font-size:60px;">1–3%</div><div class="label">Greater after-tax returns</div></div>
 <div class="stat"><div class="big" style="font-size:60px;">$84T<span style="font-size:28px;">–$124T</span></div><div class="label">Great Wealth Transfer</div></div>
</div>
</body></html>
