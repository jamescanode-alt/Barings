<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 26px;background:var(--surface-canvas);font-family:var(--font-sans);}
.row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.tok{font-family:var(--font-mono);font-size:11px;color:var(--fg-muted);width:90px;}
.bar{height:10px;background:#3B5A69;border-radius:3px;}
.px{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);width:40px;}
</style></head>
<body>
<div class="row"><div class="tok">--space-1</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
<div class="row"><div class="tok">--space-2</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
<div class="row"><div class="tok">--space-3</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
<div class="row"><div class="tok">--space-4</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
<div class="row"><div class="tok">--space-5</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
<div class="row"><div class="tok">--space-6</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
<div class="row"><div class="tok">--space-7</div><div class="bar" style="width:48px"></div><div class="px">48</div></div>
<div class="row"><div class="tok">--space-8</div><div class="bar" style="width:64px"></div><div class="px">64</div></div>
<div class="row"><div class="tok">--space-9</div><div class="bar" style="width:96px"></div><div class="px">96</div></div>
<div class="row"><div class="tok">--space-10</div><div class="bar" style="width:128px"></div><div class="px">128</div></div>
</body></html>
