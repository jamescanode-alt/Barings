<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>House fonts</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 26px;background:var(--surface-canvas);}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.block{}
.eyebrow{font-family:var(--font-sans);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:8px;}
.sample-serif{font-family:var(--font-house-serif);font-size:22px;line-height:1.25;color:var(--fg-primary);}
.sample-sans{font-family:var(--font-house-sans);font-size:18px;line-height:1.3;color:var(--fg-primary);}
.spec{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:8px;}
</style></head>
<body>
<div class="grid">
 <div class="block">
  <div class="eyebrow">House primary · Garamond</div>
  <div class="sample-serif"><em>Dear Modern Wealth Builder —</em> our platform evolves with you.</div>
  <div class="spec">Regular, Medium, Semibold · internal letters only</div>
 </div>
 <div class="block">
  <div class="eyebrow">House secondary · Avenir</div>
  <div class="sample-sans">Quarterly update · internal documents</div>
  <div class="spec">Book, Medium · internal documents only</div>
 </div>
</div>
</body></html>
