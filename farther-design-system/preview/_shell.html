<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; padding:0; background:var(--surface-canvas); }
  .card {
    padding: 20px 24px;
    min-height: 110px;
    display: flex; flex-direction: column; gap: 14px;
    box-sizing: border-box;
  }
  .swatches { display: grid; gap: 8px; }
  .swatch { display: flex; align-items: center; gap: 12px; }
  .chip {
    width: 44px; height: 44px; border-radius: 10px;
    border: 1px solid rgba(51,51,51,0.08);
    flex: 0 0 auto;
  }
  .meta { display: flex; flex-direction: column; gap: 2px; }
  .meta .name { font-family: var(--font-sans); font-weight:500; font-size:14px; color:var(--fg-primary); }
  .meta .hex  { font-family: var(--font-mono); font-size:12px; color:var(--fg-muted); letter-spacing:0; }
  .row { display: flex; align-items: center; gap: 12px; }
  .scale-row { display: flex; gap: 4px; align-items: stretch; }
  .scale-row .step {
    flex: 1; height: 56px; border-radius: 6px;
    display: flex; align-items: flex-end; justify-content: flex-start;
    padding: 6px; box-sizing: border-box;
    font-family: var(--font-mono); font-size: 10px; color: rgba(0,0,0,0.4);
  }
  .scale-row .step.on-dark { color: rgba(255,255,255,0.7); }
  .scale-label { font-family: var(--font-mono); font-size:10px; color:var(--fg-muted); text-transform:uppercase; letter-spacing:.08em; }
</style>
</head>
<body></body>
</html>
