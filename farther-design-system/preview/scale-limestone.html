<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Limestone scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:22px 26px;background:var(--surface-canvas);font-family:var(--font-sans);}
 .title{font-size:12px;color:var(--fg-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
 .row{display:flex;gap:3px;}
 .step{flex:1;height:64px;border-radius:6px;display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:rgba(0,0,0,.45);}
 .step.d{color:rgba(255,255,255,.85);}
 .steps{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head>
<body>
<div class="title">Limestone · canvas & warm neutrals</div>
<div class="row">
  <div class="step" style="background:#FCFBFA">25</div>
  <div class="step" style="background:#F8F4F0">50</div>
  <div class="step" style="background:#F2EAE2">100</div>
  <div class="step" style="background:#E3D3C5">200</div>
  <div class="step" style="background:#D1B6A0">300</div>
  <div class="step" style="background:#BE9479">400</div>
  <div class="step d" style="background:#B17B5E">500</div>
  <div class="step d" style="background:#A36A53">600</div>
  <div class="step d" style="background:#885546">700</div>
  <div class="step d" style="background:#6F473D">800</div>
  <div class="step d" style="background:#5A3C34">900</div>
</div>
<div class="steps"><span>F8F4F0</span><span></span><span></span><span>E3D3C5</span><span></span><span></span><span>B17B5E</span><span></span><span></span><span></span><span>5A3C34</span></div>
</body></html>
