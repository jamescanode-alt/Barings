<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Accessibility pairings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:20px 24px;background:var(--surface-canvas);font-family:var(--font-sans);}
 .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
 .pair{border-radius:10px;padding:14px;min-height:82px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(51,51,51,.06);}
 .big{font-family:var(--font-display);font-size:26px;line-height:1;letter-spacing:-.03em;}
 .meta{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;opacity:.75;margin-top:10px;}
</style></head>
<body>
<div class="grid">
 <div class="pair" style="background:#F8F4F0;color:#333"><div class="big">Aa</div><div class="meta"><span>Charcoal / Limestone</span><span>11.54 · AAA</span></div></div>
 <div class="pair" style="background:#333;color:#fff"><div class="big">Aa</div><div class="meta"><span>White / Charcoal</span><span>13.57 · AAA</span></div></div>
 <div class="pair" style="background:#B6D0ED;color:#333"><div class="big">Aa</div><div class="meta"><span>Charcoal / Sky</span><span>6.64 · AAA lg</span></div></div>
 <div class="pair" style="background:#5B6A71;color:#fff"><div class="big">Aa</div><div class="meta"><span>White / Slate</span><span>5.60 · AA</span></div></div>
 <div class="pair" style="background:#9F8E75;color:#333"><div class="big">Aa</div><div class="meta"><span>Charcoal / Clay</span><span>3.97 · LG only</span></div></div>
 <div class="pair" style="background:#3B5A69;color:#F8F4F0"><div class="big">Aa</div><div class="meta"><span>Limestone / Steel</span><span>7.9 · AAA</span></div></div>
</div>
</body></html>
