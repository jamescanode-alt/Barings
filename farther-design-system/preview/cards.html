<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 24px;background:var(--surface-canvas);font-family:var(--font-sans);}
.row{display:flex;gap:14px;}
.card{flex:1;background:#fff;border-radius:12px;padding:16px;border:1px solid var(--border-hairline-warm);box-shadow:var(--shadow-2);}
.glass{background:rgba(255,255,255,.72);backdrop-filter:blur(24px);border:1px solid var(--border-hairline-warm);box-shadow:var(--shadow-glass);border-radius:12px;padding:16px;flex:1;}
.dark{background:#333;color:#F8F4F0;border-radius:12px;padding:16px;flex:1;}
.eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:6px;}
.dark .eyebrow{color:#B0B0B0;}
.h{font-family:var(--font-display);font-size:22px;letter-spacing:-.03em;line-height:1.1;margin-bottom:6px;}
.b{font-size:12px;color:var(--fg-secondary);}
.dark .b{color:#D1D1D1;}
.num{font-family:var(--font-display);font-weight:300;font-size:36px;letter-spacing:-.03em;line-height:1;}
</style></head>
<body>
<div class="row">
 <div class="card"><div class="eyebrow">Summary</div><div class="h">Total clarity, zero blind spots</div><div class="b">Your investments, banking, and liabilities — unified.</div></div>
 <div class="glass"><div class="eyebrow">Portfolio</div><div class="num">$3.77M</div><div class="b" style="margin-top:6px;">+$1.64M net change YTD</div></div>
 <div class="dark"><div class="eyebrow">Advisor</div><div class="h">Janice Rowland</div><div class="b">VP, Wealth Advisor · New York, NY</div></div>
</div>
</body></html>
