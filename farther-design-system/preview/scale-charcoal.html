<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Charcoal scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:22px 26px;background:var(--surface-canvas);font-family:var(--font-sans);}
 .title{font-size:12px;color:var(--fg-muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
 .row{display:flex;gap:3px;}
 .step{flex:1;height:64px;border-radius:6px;display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:10px;color:rgba(0,0,0,.45);}
 .step.d{color:rgba(255,255,255,.75);}
 .steps{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head>
<body>
<div class="title">Charcoal · text & dark surfaces</div>
<div class="row">
  <div class="step" style="background:#FAFAFA">#FAFAFA</div>
  <div class="step" style="background:#F6F6F6">#F6F6F6</div>
  <div class="step" style="background:#E7E7E7">#E7E7E7</div>
  <div class="step" style="background:#D1D1D1">#D1D1D1</div>
  <div class="step" style="background:#B0B0B0">#B0B0B0</div>
  <div class="step" style="background:#888888">#888888</div>
  <div class="step d" style="background:#6D6D6D">#6D6D6D</div>
  <div class="step d" style="background:#5D5D5D">#5D5D5D</div>
  <div class="step d" style="background:#4F4F4F">#4F4F4F</div>
  <div class="step d" style="background:#454545">#454545</div>
  <div class="step d" style="background:#333333">#333333</div>
</div>
<div class="steps"><span>25</span><span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span></div>
</body></html>
