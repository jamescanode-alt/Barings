<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Symbol family</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 24px;background:var(--surface-canvas);}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;}
.cell{aspect-ratio:1;background:#fff;border-radius:10px;border:1px solid var(--border-hairline-warm);display:flex;align-items:center;justify-content:center;padding:10px;}
.cell img{max-width:100%;max-height:70%;}
.caption{font-family:var(--font-sans);font-size:11px;color:var(--fg-muted);margin-top:10px;}
</style></head>
<body>
<div class="grid">
 <div class="cell"><img src="../assets/icons/symbol-1.svg"></div>

 <div class="cell"><img src="../assets/icons/symbol-17.svg"></div>

 <div class="cell"><img src="../assets/icons/symbol-19.svg"></div>
 <div class="cell"><img src="../assets/icons/symbol-20.svg"></div>
 <div class="cell"><img src="../assets/icons/symbol-21.svg"></div>

 <div class="cell"><img src="../assets/icons/symbol-23.svg"></div>
