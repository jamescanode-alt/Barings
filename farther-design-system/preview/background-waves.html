<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Waves of Wealth</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;background:var(--surface-canvas);font-family:var(--font-sans);}
.head{padding:18px 26px 10px;}
.kicker{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);display:flex;align-items:center;gap:8px;}
.kicker::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--bronze-400);}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:8px 20px 18px;}
.panel{position:relative;aspect-ratio:4/3;border-radius:4px;overflow:hidden;background:#333;}
.panel img{display:block;width:100%;height:100%;object-fit:cover;object-position:center;}
.cap{padding:6px 2px 0;font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style>
</head>
<body>
<div class="head"><div class="kicker">Waves of Wealth · signature brand surface</div></div>
<div class="grid">
  <div><div class="panel"><img src="../assets/waves/steel.png" alt=""></div><div class="cap">Steel · primary brand surface</div></div>
  <div><div class="panel"><img src="../assets/waves/slate.png" alt=""></div><div class="cap">Slate · cool neutral</div></div>
  <div><div class="panel"><img src="../assets/waves/aqua.png" alt=""></div><div class="cap">Aqua · accent moment</div></div>
  <div><div class="panel"><img src="../assets/waves/limestone.png" alt=""></div><div class="cap">Limestone · warm canvas</div></div>
  <div><div class="panel"><img src="../assets/waves/sky.png" alt=""></div><div class="cap">Sky · lightest variant</div></div>
  <div><div class="panel"><img src="../assets/waves/smalt.png" alt=""></div><div class="cap">Smalt · crisp modern</div></div>
</div>
</body></html>
