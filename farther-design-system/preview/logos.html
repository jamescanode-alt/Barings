<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Logos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:0;background:var(--surface-canvas);display:grid;grid-template-columns:1fr 1fr;}
.panel{padding:22px 26px;display:flex;align-items:center;justify-content:center;min-height:130px;}
.panel.cream{background:#F8F4F0;}
.panel.navy{background:#3B5A69;}
.panel img{max-width:70%;max-height:72px;}
.panel.symbol{background:#F8F4F0;}
.row{grid-column:1/-1;display:flex;gap:20px;align-items:center;justify-content:center;padding:16px;background:#fff;border-top:1px solid var(--border-hairline-warm);}
.row img{height:50px;}
.label{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);position:absolute;margin-top:-60px;}
</style></head>
<body>
 <div class="panel cream"><img src="../assets/logos/wordmark-navy.svg" alt=""></div>
 <div class="panel navy"><img src="../assets/logos/wordmark-cream.svg" alt=""></div>
 <div class="row">
   <img src="../assets/logos/symbol.svg" alt="">
   <img src="../assets/logos/wordmark-iw-lockup.svg" alt="" style="height:40px;">
 </div>
</body></html>
