<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type hierarchy</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px 26px;background:var(--surface-canvas);}
.row{display:flex;align-items:baseline;gap:14px;padding:8px 0;border-bottom:1px solid var(--border-hairline-warm);}
.row:last-child{border:none;}
.tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);width:80px;flex:0 0 auto;}
.sample{flex:1;font-family:var(--font-display);font-weight:300;letter-spacing:-.03em;line-height:1.1;color:var(--fg-primary);}
.sample em{font-style:italic;font-weight:300;color:var(--steel-700);}
.sub{font-family:var(--font-sans);font-weight:400;letter-spacing:-.01em;line-height:1.25;}
.body{font-family:var(--font-sans);font-weight:400;letter-spacing:-.005em;line-height:1.4;}
.eye{font-family:var(--font-sans);font-weight:500;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-secondary);}
</style></head>
<body>
<div class="row"><div class="tag">H1 / 44</div><div class="sample" style="font-size:44px;">Human, with a <em>tech</em> edge</div></div>
<div class="row"><div class="tag">H3 / 28</div><div class="sample" style="font-size:28px;">Experienced advisors, <em>smarter</em> technology</div></div>
<div class="row"><div class="tag">Sub / 17</div><div class="sample sub" style="font-size:17px;color:var(--fg-secondary);">Combining expert judgment with native technology.</div></div>
<div class="row"><div class="tag">Body / 14</div><div class="sample body" style="font-size:14px;">Farther unifies your full financial life in one place.</div></div>
<div class="row"><div class="tag">Eyebrow</div><div class="sample eye">Summary</div></div>
</body></html>
