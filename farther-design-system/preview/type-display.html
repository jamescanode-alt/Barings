<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:28px 30px;background:var(--surface-canvas);}
.eyebrow{font-family:var(--font-sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg-muted);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.eyebrow::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--bronze-400);}
.display{font-family:var(--font-display);font-weight:300;font-size:72px;line-height:1.05;letter-spacing:-.03em;color:var(--fg-primary);}
.display em{font-style:italic;font-weight:300;color:var(--steel-700);}
.spec{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);margin-top:14px;letter-spacing:0;}
</style></head>
<body>
<div class="eyebrow">Display · ABC Arizona Text Light</div>
<div class="display">Welcome to<br/><em>Intelligent</em> Wealth</div>
<div class="spec">ABC Arizona Text Light (300) · italic for emphasis · 72 / 76 · −3% tracking · sentence case · no terminal period</div>
</body></html>
