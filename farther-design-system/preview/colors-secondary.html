<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Secondary palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
 body{margin:0;padding:22px 26px;background:var(--surface-canvas);}
 .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
 .sw{display:flex;flex-direction:column;gap:8px;}
 .chip{height:84px;border-radius:12px;border:1px solid rgba(51,51,51,.08);}
 .name{font-family:var(--font-sans);font-size:12px;font-weight:500;color:var(--fg-primary);}
 .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-muted);}
</style></head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#3B5A69"></div><div class="name">Steel Blue 700</div><div class="hex">#3B5A69 · brand lock</div></div>
  <div class="sw"><div class="chip" style="background:#31465C"></div><div class="name">Granite 800</div><div class="hex">#31465C · deep</div></div>
  <div class="sw"><div class="chip" style="background:#5B6A71"></div><div class="name">Slate 500</div><div class="hex">#5B6A71 · neutral</div></div>
  <div class="sw"><div class="chip" style="background:#557A89"></div><div class="name">Smalt 500</div><div class="hex">#557A89 · crisp</div></div>
  <div class="sw"><div class="chip" style="background:#B6D0ED"></div><div class="name">Sky 300</div><div class="hex">#B6D0ED · optimistic</div></div>
</div>
</body></html>
